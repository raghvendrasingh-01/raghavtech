# Render blueprint for the Pulse API.
# Deploy: create a new Blueprint on Render pointing at this repo, set rootDir to
# pulse/api (or copy this file to the repo root and set the rootDir below).
services:
  - type: web
    name: pulse-api
    runtime: python
    rootDir: pulse/api
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://raghavtech.me,https://www.raghavtech.me,https://pulse.vercel.app,http://localhost:3000"
